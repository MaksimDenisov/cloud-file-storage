services:
  app:
    container_name: app
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - JDBC_ROOT=root
      - JDBC_PASSWORD=root
      - JDBC_URL=jdbc:mysql://mysql:3306/file_storage
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=redis-password
      - MINIO_URL=http://s3:9000
      - MINIO_USER=minio-user
      - MINIO_PASSWORD=password
    networks:
      - internal_network
    restart: on-failure:5
    depends_on:
      - mysql
      - s3
      - redis
    command: ["java", "-jar", "/usr/app/build/libs/cloud-file-storage.jar" ]
  mysql:
    container_name: mysql-container
    image: mysql:8
    volumes:
      - mysql_volume:/var/lib/mysql
    environment:
      MYSQL_DATABASE: file_storage
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    expose:
      - 3306
      - 33060
    networks:
      - internal_network
  s3:
    container_name: file-storage-minio
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minio-user
      MINIO_ROOT_PASSWORD: password
    expose:
      - 9000
    volumes:
      - /home/minio:/data
    networks:
      - internal_network
    command: server /data --console-address ":9001"
  redis:
    container_name: redis-container
    image: redis:latest
    environment:
      REDIS_PASSWORD: redis-password
      REDIS_USER: redis-user
      REDIS_USER_PASSWORD: redis-user-password
    expose:
      - 6379
    volumes:
      - ./redisdata:/data
    networks:
      - internal_network
volumes:
  mysql_volume:
    driver: local
  minio:
    driver: local
networks:
  internal_network:
    driver: bridge